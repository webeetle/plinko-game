<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>weBeetle Plinko Challenge</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --black: #000000;
    --white: #ffffff;
    --green: #359652;
    --green-bright: #46cf72;
    --gold: #ffd24a;
    --panel: #0b0f0c;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #000; overflow: hidden;
    font-family: "Space Grotesk", system-ui, sans-serif;
    color: #fff;
    user-select: none; -webkit-user-select: none;
  }
  #viewport {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #000;
  }
  #stage {
    position: relative;
    width: 1080px; height: 1920px;
    transform-origin: center center;
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(53,150,82,0.18), transparent 60%),
      radial-gradient(100% 60% at 50% 110%, rgba(53,150,82,0.10), transparent 60%),
      #050706;
    overflow: hidden;
  }
  /* dot grid + scanline texture */
  #stage::before {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background-image: radial-gradient(rgba(255,255,255,0.05) 1.5px, transparent 1.6px);
    background-size: 38px 38px;
    opacity: 0.6; z-index: 0;
  }
  #stage::after {
    content: ""; position: absolute; inset: 0; pointer-events: none; z-index: 60;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 3px, rgba(0,0,0,0.10) 4px);
    mix-blend-mode: multiply;
  }
  .display { font-family: "Anton", sans-serif; font-weight: 400; letter-spacing: 0.02em; }
  #root { position: absolute; inset: 0; z-index: 5; }

  @keyframes spin360 { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.001ms !important; }
  }
</style>
</head>
<body>
  <div id="viewport">
    <div id="stage">
      <div id="root"></div>
    </div>
  </div>

  <script>
    // Stage scaler: fit 1080x1920 into viewport, letterbox on black.
    (function () {
      const stage = document.getElementById('stage');
      function fit() {
        const s = Math.min(window.innerWidth / 1080, window.innerHeight / 1920);
        stage.style.transform = 'scale(' + s + ')';
      }
      window.addEventListener('resize', fit);
      fit();
    })();
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="prizes.js"></script>
  <script src="audio.js"></script>
  <script src="confetti.js"></script>
  <script src="plinko.js"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
